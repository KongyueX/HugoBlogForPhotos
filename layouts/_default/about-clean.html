{{ define "main" }}
  <article class="max-w-prose">
    <header class="mt-10">
      <h1 class="text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
      {{ with .Description }}
        <p class="mt-3 text-base text-neutral-600 dark:text-neutral-300">{{ . }}</p>
      {{ end }}
    </header>
    <section class="mt-8 prose dark:prose-invert max-w-none">
      {{ .Content }}
    </section>
  </article>
{{ end }}
